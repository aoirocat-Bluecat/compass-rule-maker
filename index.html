<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#コンパス カスタムルール作成</title>
<style>
  body { font-family: Arial; background:#111; color:#fff; padding:20px; }
  h1 { text-align:center; }
  .container { max-width:900px; margin:auto; }
  .card { background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:15px; }
  input, select { width:100%; padding:8px; margin:6px 0 10px; border-radius:6px; border:none; }
  button { padding:10px; border:none; border-radius:6px; background:#00c3ff; color:#fff; cursor:pointer; margin-right:8px; }
  .output { white-space:pre-wrap; background:#fff; color:#000; padding:12px; border-radius:10px; font-weight:bold; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .cardBtn { background:#2a3a4a; color:#fff; padding:10px; border-radius:8px; }
  .cardBtn.active { background:#ff4655; position:relative; }
  .cardBtn.active::after {
    content:"禁止";
    position:absolute;
    top:4px; right:6px;
    font-size:10px;
    background:#000;
    padding:2px 4px;
    border-radius:4px;
  }
</style>
</head>

<body>
<div class="container">
<h1>#コンパス カスタムルール作成ツール</h1>

<div class="card">
<label>試合時間</label>
<select id="time">
  <option value="60">60秒</option>
  <option value="90">90秒</option>
  <option value="180" selected>180秒（通常）</option>
  <option value="240">240秒</option>
  <option value="300">300秒</option>
  <option value="480">480秒</option>
  <option value="999">999秒</option>
</select>

<label>カード制限</label>
<div class="grid">
<button class="cardBtn">近距離</button>
<button class="cardBtn">遠距離</button>
<button class="cardBtn">連続</button>
<button class="cardBtn">周囲</button>
<button class="cardBtn">回復</button>
<button class="cardBtn">ガード</button>
<button class="cardBtn">強化</button>
<button class="cardBtn">弱体化</button>
<button class="cardBtn">移動</button>
<button class="cardBtn">設置</button>
<button class="cardBtn">カウンター</button>
<button class="cardBtn">その他</button>
</div>

<label>試合数</label>
<select id="matchCount">
<option value="1">1試合</option>
<option value="2">2試合</option>
<option value="3" selected>3試合</option>
<option value="5">5試合</option>
</select>

<div id="matchMaps"></div>

<button onclick="generateRule()">ルール生成</button>
<button onclick="saveImage()">画像保存</button>
</div>

<div class="card" id="resultCard">
<h3>生成結果</h3>
<div id="output" class="output"></div>

<!-- 🔥 Xロゴ付きクレジット -->
<div style="margin-top:10px;display:flex;justify-content:flex-end;align-items:center;gap:6px;font-size:12px;opacity:0.8;">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"
       width="16"
       style="filter: invert(1);">
  <a href="https://twitter.com/AoirocatYoutube" target="_blank"
     style="color:#00c3ff;text-decoration:none;">
     @AoirocatYoutube
  </a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const maps = ["グレートウォール","ちゅら島リゾート","東西たかさん広場"];

function generateMatchSelectors() {
  const container = document.getElementById('matchMaps');
  const count = document.getElementById('matchCount').value;
  const labels = ["一戦目","二戦目","三戦目","四戦目","五戦目"];
  container.innerHTML = "";

  for(let i=1;i<=count;i++){
    const label = document.createElement('label');
    label.textContent = labels[i-1];

    const select = document.createElement('select');
    select.id = "map_"+i;

    maps.forEach(m=>{
      const opt=document.createElement('option');
      opt.value=m;
      opt.textContent=m;
      select.appendChild(opt);
    });

    container.appendChild(label);
    container.appendChild(select);
  }
}

function generateRule(){
  const time=document.getElementById('time').value;
  const cards=[...document.querySelectorAll('.cardBtn.active')].map(b=>b.innerText).join(', ');
  const count=document.getElementById('matchCount').value;
  const labels=["一戦目","二戦目","三戦目","四戦目","五戦目"];

  let text=`試合時間: ${time}秒\n\n`;

  for(let i=1;i<=count;i++){
    text+=`${labels[i-1]}: ${document.getElementById("map_"+i).value}\n`;
  }

  text+=`\nカード制限: ${cards||"なし"}`;

  document.getElementById('output').innerText=text;
}

function saveImage(){
  html2canvas(document.getElementById('resultCard'),{
    backgroundColor:"#ffffff",
    scale:2
  }).then(canvas=>{
    const link=document.createElement('a');
    link.download='rule.png';
    link.href=canvas.toDataURL();
    link.click();
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  generateMatchSelectors();
  document.getElementById('matchCount').addEventListener('change',generateMatchSelectors);

  document.querySelectorAll('.cardBtn').forEach(btn=>{
    btn.addEventListener('click',()=>btn.classList.toggle('active'));
  });
});
</script>
</body>
</html>
